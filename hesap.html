<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">
<title>Hesap Makinesi – Merkez & Dairesel</title>
<style>
:root {
    --bg: #faf3e0;
    --card-bg: rgba(255, 255, 245, 0.94);
    --primary: #1e3a8a;
    --secondary: #ddd2b6;
    --text-main: #2c3e4e;
    --text-sub: #6c757d;
    --btn-shadow: #c9c0a8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
    background-color: #faf3e0;
    background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 29px,
        #e0d5bd 30px,
        #e0d5bd 31px
    );
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: var(--text-main);
    overflow: hidden;
}

.wrapper {
    position: relative;
    width: 100%;
    max-width: 360px;
    height: 90vh;
    background: transparent;
}

.view {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 245, 0.92);
    border-radius: 28px;
    border: 1px solid rgba(224, 213, 165, 0.5);
    transition: transform 0.18s linear;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    will-change: transform;
}

.view.off-right { transform: translateX(100%); pointer-events: none; }
.view.off-left { transform: translateX(-100%); pointer-events: none; }
.view.active { transform: translateX(0); }

.display-container {
    height: 115px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 15px;
    background: rgba(255, 255, 245, 0.96);
    border-bottom: 1px solid var(--secondary);
}

.history {
    font-size: 18px;
    color: var(--text-sub);
    text-align: right;
    min-height: 24px;
    margin-bottom: 1px;
}

.display {
    font-size: 54px;
    font-weight: 700;
    text-align: right;
    color: var(--text-main);
    overflow: hidden;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 15px;
    flex-grow: 1;
}

.button {
    height: 65px;
    background: white;
    border: 1.5px solid var(--secondary);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 600;
    color: var(--text-main);
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
    transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
    cursor: pointer;
    will-change: transform;
}

.button:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
}

.operator { border-color: var(--primary); color: var(--primary); }
.function { color: #dc3545; }
.equals { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 4px 0 #0f2a5e; }
.equals:active { box-shadow: 0 1px 0 #0f2a5e; }

.mode-btn {
    grid-column: span 2;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 16px;
    height: 50px;
    box-shadow: 0 4px 0 #0f2a5e;
}

.mode-header {
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--secondary);
    background: rgba(255, 255, 245, 0.96);
}

.mode-title { color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 15px; }

form.inner-form {
    padding: 12px 20px;
    gap: 10px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
}

.inner-form label {
    font-weight: 700;
    font-size: 11px;
    color: var(--text-main);
    text-transform: uppercase;
    margin-bottom: -6px;
}

.inner-form > input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 2px solid var(--primary);
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    color: var(--text-main);
    background: #fff;
    cursor: pointer;
}

.inner-form > input[type="text"]:focus {
    outline: none;
    border-color: #dc3545;
    box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.2);
}

.inner-form > input[type="text"].active-input {
    border-color: #dc3545;
    box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.2);
}

.result-card {
    background: var(--primary);
    color: #fff;
    padding: 12px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 6px 15px rgba(30, 58, 138, 0.3);
}

.nav-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 20px;
    box-shadow: 0 3px 0 #0f2a5e;
    cursor: pointer;
    transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
}

.nav-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #0f2a5e;
}

/* RADIO STYLES */
.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
}

.radio-option {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-main);
}

.radio-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2.5px solid #ccc;
    display: inline-block;
    flex-shrink: 0;
    position: relative;
}

.radio-option input[type="radio"] { display: none; }

.radio-option input[type="radio"]:checked ~ .radio-dot {
    background: var(--accent, #2ecc71);
    border-color: var(--accent, #2ecc71);
}

.radio-option input[type="radio"]:checked ~ .radio-dot::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
}

.radio-custom-input {
    width: 50px;
    padding: 5px 3px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    border: 2px solid var(--secondary);
    border-radius: 8px;
    background: #f5f5f5;
    color: var(--text-sub);
    -moz-appearance: textfield;
    margin-left: 2px;
    vertical-align: middle;
    cursor: pointer;
}

.radio-custom-input:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.radio-custom-input:not(:disabled) {
    background: #fff;
    border-color: var(--primary);
    color: var(--text-main);
    opacity: 1;
}

.radio-custom-input:focus,
.radio-custom-input.active-input {
    outline: none;
    border-color: #dc3545;
    box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.2);
}

/* NUMERIC KEYPAD */
    .numeric-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px 20px 15px;
    background: rgba(255, 255, 245, 0.96);
    border-top: 1px solid var(--secondary);
}

.keypad-btn {
    height: 48px;
    background: white;
    border: 1.5px solid var(--secondary);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-main);
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.1);
    transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
    cursor: pointer;
    will-change: transform;
}

.keypad-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
}

.keypad-btn.keypad-del {
    color: #dc3545;
    grid-column: span 2;
    font-size: 18px;
    font-weight: 700;
}

.keypad-btn.keypad-dot {
    font-weight: 700;
}
</style>

<script>
const views={
  calc:document.getElementById('calc-view'),
  merkez:document.getElementById('merkez-view'),
  dairesel:document.getElementById('dairesel-view')
};

function goTo(target){
  Object.values(views).forEach(v=>v.classList.remove('active','off-left','off-right'));
  if(target==='calc'){views.calc.classList.add('active');views.merkez.classList.add('off-right');views.dairesel.classList.add('off-right');}
  else if(target==='merkez'){views.calc.classList.add('off-left');views.merkez.classList.add('active');views.dairesel.classList.add('off-right');}
  else if(target==='dairesel'){views.calc.classList.add('off-left');views.dairesel.classList.add('active');views.merkez.classList.add('off-right');}
}

document.getElementById('open-merkez').onclick=()=>goTo('merkez');
document.getElementById('open-dairesel').onclick=()=>goTo('dairesel');
document.getElementById('close-merkez').onclick=()=>goTo('calc');
document.getElementById('close-dairesel').onclick=()=>goTo('calc');

class CalcEngine{
  constructor(displayEl, historyEl){
    this.displayEl=displayEl; this.historyEl=historyEl; this.current='0'; this.previous=null; this.operation=null; this.resetScreen=false; this.update();
  }
  update(){
    let displayText = this.current;
    if(displayText !== 'Error'){
        let[int,dec]=displayText.split('.');
        int=int.replace(/\B(?=(\d{3})+(?!\d))/g,',');
        displayText = dec ? int+'.'+dec : int;
    }
    this.displayEl.textContent = displayText;
    this.historyEl.textContent = this.operation ? `${this.previous} ${this.getOpSym(this.operation)}` : '';
  }
  getOpSym(op){
      const syms = {add:'+', subtract:'-', multiply:'×', divide:'÷'};
      return syms[op] || '';
  }
  clear(){this.current='0';this.previous=this.operation=null;this.resetScreen=false;this.update();}
  sign(){this.current=(parseFloat(this.current)*-1).toString();this.update();}
  backspace(){
    if(this.current==='Error'){this.clear();return;}
    if(this.current.length===1||(this.current.length===2&&this.current.startsWith('-')))this.current='0';
    else this.current=this.current.slice(0,-1);this.update();
  }
  append(n){
    if(this.resetScreen || this.current==='0' || this.current==='Error'){this.current=n;this.resetScreen=false;}
    else this.current+=n;this.update();
  }
  decimal(){
    if(this.resetScreen){this.current='0.';this.resetScreen=false;}
    else if(this.current==='Error'){this.current='0.';}
    else if(!this.current.includes('.'))this.current+='.';this.update();
  }
  chooseOp(op){
    if(this.operation)this.calculate();
    this.previous=this.current;this.operation=op;this.resetScreen=true;this.update();
  }
  calculate(){
    if(!this.operation||this.previous===null)return;
    const prev=parseFloat(this.previous),cur=parseFloat(this.current);
    if(isNaN(prev)||isNaN(cur)) return;
    let result;
    switch(this.operation){
      case'add':result=prev+cur;break;
      case'subtract':result=prev-cur;break;
      case'multiply':result=prev*cur;break;
      case'divide':result=cur===0?'Error':prev/cur;break;
    }
    if(result !== 'Error'){
        result = parseFloat(result.toPrecision(12));
    }
    this.current=result.toString();this.operation=null;this.resetScreen=true;this.update();
  }
}

const mainCalc=new CalcEngine(document.getElementById('display'), document.getElementById('history'));
document.getElementById('calc-view').addEventListener('click',e=>{
  const btn=e.target.closest('.button'); if(!btn)return;
  const action=btn.dataset.action,num=btn.dataset.num;
  if(num!==undefined)mainCalc.append(num);
  else switch(action){
    case'clear':mainCalc.clear();break;
    case'backspace':mainCalc.backspace();break;
    case'sign':mainCalc.sign();break;
    case'decimal':mainCalc.decimal();break;
    case'add':case'subtract':case'multiply':case'divide':mainCalc.chooseOp(action);break;
    case'equals':mainCalc.calculate();break;
  }
});

/* ========== NUMERIC KEYPAD LOGIC ========== */
let activeInputEl = null;

function setActiveInput(el) {
    if (activeInputEl) {
        activeInputEl.classList.remove('active-input');
    }
    activeInputEl = el;
    if (activeInputEl) {
        activeInputEl.classList.add('active-input');
    }
}

function setupKeypad(keypadId, inputSelectors) {
    const keypad = document.getElementById(keypadId);
    if (!keypad) return;

    const allInputs = [];
    inputSelectors.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) allInputs.push(el);
    });

    allInputs.forEach(input => {
        input.addEventListener('focus', () => setActiveInput(input));
        input.addEventListener('click', () => setActiveInput(input));
    });

    keypad.addEventListener('click', (e) => {
        const btn = e.target.closest('.keypad-btn');
        if (!btn) return;
        if (!activeInputEl) return;
        if (activeInputEl.disabled) return;

        const num = btn.dataset.num;
        const action = btn.dataset.action;

        if (num !== undefined) {
            activeInputEl.value += num;
            triggerInputChange(activeInputEl);
        } else if (action === 'del') {
            activeInputEl.value = activeInputEl.value.slice(0, -1);
            triggerInputChange(activeInputEl);
        } else if (action === 'dot') {
            if (!activeInputEl.value.includes('.')) {
                if (activeInputEl.value === '') {
                    activeInputEl.value = '0.';
                } else {
                    activeInputEl.value += '.';
                }
            }
            triggerInputChange(activeInputEl);
        }
    });
}

function triggerInputChange(inputEl) {
    const event = new Event('input', { bubbles: true });
    inputEl.dispatchEvent(event);
    if (inputEl.id === 'merkez-olcusu' || inputEl.id === 'tam-cap-custom') {
        merkezHesap();
    }
    if (inputEl.id === 'pcd-radius' || inputEl.id === 'hole-count-custom' || inputEl.id === 'hole-diam-custom') {
        daireselHesap();
    }
}

/* MERKEZ HESAP */
function merkezHesap(){
  let tamCap;
  const tamCapChecked=document.querySelector('input[name="tam-cap"]:checked');
  if(!tamCapChecked){ tamCap=NaN; }
  else if(tamCapChecked.value==='custom'){
    tamCap=parseFloat(document.getElementById('tam-cap-custom').value.replace(',','.'));
  } else {
    tamCap=parseFloat(tamCapChecked.value);
  }
  const merk=parseFloat(document.getElementById('merkez-olcusu').value.replace(',','.'));
  document.getElementById('merkez-sonuc').textContent=(isNaN(tamCap)||isNaN(merk))?'-':(merk-tamCap/2).toFixed(2) + " mm";
}

document.querySelectorAll('input[name="tam-cap"]').forEach(r=>{
  r.addEventListener('change',function(){
    const customInput=document.getElementById('tam-cap-custom');
    if(this.value==='custom'){
      customInput.disabled=false;
      customInput.readOnly = false;
      customInput.focus();
    } else {
      customInput.disabled=true;
      customInput.readOnly = true;
      customInput.value='';
    }
    merkezHesap();
  });
});

document.getElementById('tam-cap-custom').addEventListener('input', merkezHesap);
document.getElementById('merkez-olcusu').addEventListener('input', merkezHesap);

document.getElementById('merkez-temizle').onclick=()=>{
  document.querySelector('input[name="tam-cap"][value="2.5"]').checked=true;
  document.getElementById('tam-cap-custom').value='';
  document.getElementById('tam-cap-custom').disabled=true;
  document.getElementById('tam-cap-custom').readOnly = true;
  document.getElementById('merkez-olcusu').value='';
  document.getElementById('merkez-sonuc').textContent='-';
  setActiveInput(document.getElementById('merkez-olcusu'));
};

/* DAİRESEL HESAP */
function daireselHesap(){
  const radius=parseFloat(document.getElementById('pcd-radius').value.replace(',','.'));

  let count;
  const countChecked=document.querySelector('input[name="hole-count"]:checked');
  if(!countChecked){ count=NaN; }
  else if(countChecked.value==='custom'){
    count=parseFloat(document.getElementById('hole-count-custom').value.replace(',','.'));
  } else {
    count=parseFloat(countChecked.value);
  }

  let diam;
  const diamChecked=document.querySelector('input[name="hole-diam"]:checked');
  if(!diamChecked){ diam=NaN; }
  else if(diamChecked.value==='custom'){
    diam=parseFloat(document.getElementById('hole-diam-custom').value.replace(',','.'));
  } else {
    diam=parseFloat(diamChecked.value);
  }

  if(isNaN(count)||isNaN(radius)||isNaN(diam)||count<2){
    document.getElementById('center-to-center').textContent='-';
    document.getElementById('outer-distance').textContent='-';
    return;
  }
  const center2=2*radius*Math.sin((180/count)*(Math.PI/180));
  document.getElementById('center-to-center').textContent=center2.toFixed(2)+' mm';
  document.getElementById('outer-distance').textContent=(center2+diam).toFixed(2)+' mm';
}

document.getElementById('pcd-radius').addEventListener('input', daireselHesap);

document.querySelectorAll('input[name="hole-count"]').forEach(r=>{
  r.addEventListener('change',function(){
    const customInput=document.getElementById('hole-count-custom');
    if(this.value==='custom'){
      customInput.disabled=false;
      customInput.readOnly = false;
      customInput.focus();
    } else {
      customInput.disabled=true;
      customInput.readOnly = true;
      customInput.value='';
    }
    daireselHesap();
  });
});

document.getElementById('hole-count-custom').addEventListener('input', daireselHesap);

document.querySelectorAll('input[name="hole-diam"]').forEach(r=>{
  r.addEventListener('change',function(){
    const customInput=document.getElementById('hole-diam-custom');
    if(this.value==='custom'){
      customInput.disabled=false;
      customInput.readOnly = false;
      customInput.focus();
    } else {
      customInput.disabled=true;
      customInput.readOnly = true;
      customInput.value='';
    }
    daireselHesap();
  });
});

document.getElementById('hole-diam-custom').addEventListener('input', daireselHesap);

document.getElementById('dairesel-temizle').onclick=()=>{
  document.getElementById('pcd-radius').value='';
  document.querySelector('input[name="hole-count"][value="2"]').checked=true;
  document.getElementById('hole-count-custom').value='';
  document.getElementById('hole-count-custom').disabled=true;
  document.getElementById('hole-count-custom').readOnly = true;
  document.querySelector('input[name="hole-diam"][value="2.5"]').checked=true;
  document.getElementById('hole-diam-custom').value='';
  document.getElementById('hole-diam-custom').disabled=true;
  document.getElementById('hole-diam-custom').readOnly = true;
  daireselHesap();
  setActiveInput(document.getElementById('pcd-radius'));
};
